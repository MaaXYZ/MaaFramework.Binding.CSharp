name: cd

on:
  workflow_dispatch:
    inputs:
      Publish:
        description: 'Publish option'
        required: true
        default: 'NuGetTest'
        type: choice
        options:
          - NuGet
          - NuGetTest
  push:
    branches:
      - "**"
    paths:
      - ".github/workflows/cd.yml"
      - "docs/build.ps1"
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages # NuGet CLI environment variables
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            7.0.x
            9.0.x
          cache: true
          cache-dependency-path: '**/packages.lock.json'
      - run: dotnet restore --locked-mode
      - run: dotnet tool update -g dotnet-script
      - run: dotnet tool update -g docfx

      - id: build
        run: dotnet script ./tools/Builder/Build.csx

      - name: Preview CHANGELOG
        if: false
        run: |
          $latest = gh release view --json tagName --jq .tagName
          python3 tools/ChangelogGenerator/changelog_generator.py --tag "${{ steps.build.outputs.tag }}" --latest "$latest"
      - run: ./docs/build.ps1

      - uses: actions/upload-artifact@v7
        with:
          name: nupkgs
          path: nupkgs
          retention-days: 7
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_site
    outputs:
      tag: ${{ steps.build.outputs.tag }}
      version: ${{ steps.build.outputs.version }}
      is_release: ${{ steps.build.outputs.is_release }}
      is_preview: ${{ steps.build.outputs.is_preview }}

  test:
    needs: [ build ]
    runs-on: windows-latest
    if: needs.build.outputs.is_release != 'True' && github.event.inputs.Publish != 'NuGet'
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: nupkgs
      - id: login
        uses: NuGet/login@v1
        with:
          user: moomiji
          token-service-url: https://int.nugettest.org/api/v2/token
          audience: https://int.nugettest.org
      - name: Publish the package to int.nugettest.org
        run: dotnet nuget push *.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://apiint.nugettest.org/v3/index.json

  release:
    needs: [ build ]
    runs-on: windows-latest
    if: needs.build.outputs.is_release == 'True' || github.event.inputs.Publish == 'NuGet'
    permissions:
      contents: write
      pages: write      # to deploy to Pages
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8

      - id: login
        uses: NuGet/login@v1
        with:
          user: moomiji

      - name: Publish the package to nuget.org
        run: |
          cd nupkgs
          dotnet nuget push *.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5

      - name: Re-zip docs
        run: |
          cd github-pages
          7z x artifact.tar -o'${{ needs.build.outputs.version }}'
          7z a docs.zip '${{ needs.build.outputs.version }}'

      - if: needs.build.outputs.is_release == 'True'
        uses: softprops/action-gh-release@v3
        with:
          body_path: CHANGELOG.md
          tag_name: ${{ needs.build.outputs.tag }}
          files: github-pages/docs.zip
          prerelease: ${{ needs.build.outputs.is_preview == 'True' }}
